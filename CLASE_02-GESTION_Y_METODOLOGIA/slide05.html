        <h1>05. Scrum: Roles y Eventos</h1>
        <div class="content-grid">

                <p>Scrum no es un proceso, es un marco de trabajo (framework) para gestionar problemas complejos.</p>
                <ul>
                    <li><strong>Roles:</strong> Product Owner (Qué), Scrum Master (Cómo/Facilitador), Dev Team.</li>
                    <li><strong>Sprint:</strong> Iteración de tiempo fijo (1-4 semanas) para entregar un incremento funcional.</li>
                </ul>
            </article>
            <figure>
                <img src="./imgs/Scrum_process.svg" class="responsive-img" style="background: white; padding: 10px;">
